<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaMus Fashion — Mahsulot Turlari</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            padding-bottom: 80px;
        }
        /* Rasm oynasi */
        .image-viewer {
            width: 100%;
            position: relative;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-viewer img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            display: block;
            transition: all 0.3s ease;
        }
        /* Mahsulot ma'lumotlari */
        .details-box {
            padding: 20px;
        }
        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111;
            line-height: 1.4;
        }
        .product-price {
            font-size: 22px;
            font-weight: 800;
            color: #e67e22;
            margin-bottom: 20px;
        }
        /* Sarlavhalar */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            margin-top: 15px;
        }
        /* Rang variantlari (Turlari) */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-card {
            border: 2px solid #eaeded;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fff;
        }
        .option-card:hover {
            border-color: #bdc3c7;
        }
        .option-card.active {
            border-color: #e67e22;
            background-color: #fdf6f0;
        }
        .option-card img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 6px;
        }
        .option-card span {
            font-size: 11px;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }
        /* O'lchamlar (Razmerlar) */
        .sizes-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }
        .size-btn {
            padding: 10px 16px;
            border: 1px solid #d5dbdb;
            border-radius: 8px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .size-btn.active {
            background-color: #111;
            color: #fff;
            border-color: #111;
        }
        /* Tasdiqlash tugmasi */
        .footer-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(230,126,34,0.3);
            transition: all 0.2s ease;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-viewer">
        <img id="main-product-img" src="https://images.unsplash.com/photo-1519457431-44ccd64a579b?w=500" alt="SaMus">
    </div>

    <div class="details-box">
        <div class="product-title" id="display-title">Yuklanmoqda...</div>
        <div class="product-price" id="display-price">- SO'M</div>
        
        <hr style="border: 0; height: 1px; background: #eaeded; margin: 20px 0;">

        <div class="section-title">🎨 Rangni (Turini) tanlang:</div>
        <div class="options-grid" id="sku-options-container">
            </div>

        <div class="section-title">📐 O'lchamni (Razmer) tanlang:</div>
        <div class="sizes-flex" id="sizes-container">
            </div>
    </div>

    <div class="footer-action">
        <button class="submit-btn" onclick="sendOrderData()">🛍️ Buyurtmani tasdiqlash</button>
    </div>
</div>

<script>
    // Telegram Web Appni ishga tushirish
    const tg = window.Telegram.WebApp;
    tg.expand(); // Ilovani to'liq ekranga ochish

    // URL parametrlarni o'qish (Python yuborgan ma'lumotlar)
    const urlParams = new URLSearchParams(window.location.search);
    const rawSkus = urlParams.get('skus');

    let skuData = [];
    let selectedSkuIndex = 0;
    let selectedSize = "";

    if (rawSkus) {
        try {
            skuData = JSON.parse(decodeURIComponent(rawSkus));
            console.log("Muvaffaqiyatli SKU yuklandi:", skuData);
        } catch (e) {
            console.error("JSON parslashda xatolik:", e);
        }
    }

    // Ekran elementlarini render qilish
    function initApp() {
        if (!skuData || skuData.length === 0) {
            document.getElementById('display-title').innerText = "SaMus Trend Model";
            return;
        }

        // Birinchi model nomini chiroyli o'rnatish
        document.getElementById('display-title').innerText = "Premium SaMus Collection";
        
        const optionsContainer = document.getElementById('sku-options-container');
        optionsContainer.innerHTML = "";

        // 1. Turlarni (Rang kartochkalarini) yaratish
        skuData.forEach((sku, index) => {
            const card = document.createElement('div');
            card.className = `option-card ${index === 0 ? 'active' : ''}`;
            card.onclick = () => selectSku(index);

            card.innerHTML = `
                <img src="${sku.imageUrl}" alt="${sku.specText}">
                <span>${sku.specText}</span>
            `;
            optionsContainer.appendChild(card);
        });

        // Birinchi turni faollashtirish
        selectSku(0);
    }

    // 2. Foydalanuvchi turni (rangni) o'zgartirganda ishlaydigan funksiya
    function selectSku(index) {
        selectedSkuIndex = index;
        const currentSku = skuData[index];

        // Kartochkalar klassini yangilash
        const cards = document.querySelectorAll('.option-card');
        cards.forEach((c, i) => {
            c.className = `option-card ${i === index ? 'active' : ''}`;
        });

        // Rasm va narxni dinamik o'zgartirish
        document.getElementById('main-product-img').src = currentSku.imageUrl;
        document.getElementById('display-price').innerText = currentSku.price_uzs;

        // 3. SHU RANGGA TEGISHLI HAQIQIY RAZMERLARNI CHIQARISH 🧠
        const sizesContainer = document.getElementById('sizes-container');
        sizesContainer.innerHTML = "";
        selectedSize = ""; // Reset

        if (currentSku.sizes) {
            // "66 sm-73 sm-80 sm" ko'rinishidagi matnni bo'laklarga ajratamiz
            const sizeList = currentSku.sizes.split('-');
            
            sizeList.forEach((size) => {
                if (size.strip !== "") {
                    const btn = document.createElement('button');
                    btn.className = "size-btn";
                    btn.innerText = size;
                    btn.onclick = () => {
                        // Oldingi faol o'lchamni o'chirish
                        const activeBtn = sizesContainer.querySelector('.size-btn.active');
                        if (activeBtn) activeBtn.classList.remove('active');
                        
                        btn.classList.add('active');
                        selectedSize = size;
                    };
                    sizesContainer.appendChild(btn);
                }
            });

            // Birinchi o'lchamni avtomat tanlab qo'yish
            if (sizesContainer.firstChild) {
                sizesContainer.firstChild.click();
            }
        }
    }

    // 4. Buyurtmani Telegram botga qaytarib yuborish
    function sendOrderData() {
        if (skuData.length === 0) {
            tg.close();
            return;
        }

        const currentSku = skuData[selectedSkuIndex];

        if (!selectedSize) {
            alert("Iltimos, o'lcham (razmer) tanlang!");
            return;
        }

        // Botga ketadigan buyurtma ob'ekti
        const resultData = {
            specText: currentSku.specText,
            imageUrl: currentSku.imageUrl,
            price_uzs: currentSku.price_uzs,
            selected_size: selectedSize
        };

        // Ma'lumotni jo'natish va Mini Appni yopish
        tg.sendData(JSON.stringify(resultData));
    }

    // Dasturni ishga tushirish
    window.onload = initApp;
</script>
</body>
</html>
